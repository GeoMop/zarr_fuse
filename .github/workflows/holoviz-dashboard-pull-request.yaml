name: HoloViz Dashboard - pull request

on:
  pull_request:
    branches:
      - "MF_HoloViz_integration"
    paths:
      - dashboard/**
  workflow_dispatch:

jobs:
  get-version-tag:
    name: Get version tag
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.get_version_tag.outputs.version-tag }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-get-version-tag
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version tag
        id: get_version_tag
        run: |
          echo "version-tag=ci-$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

  containerize-backend:
    name: Containerize HoloViz backend
    runs-on: ubuntu-latest
    container:
      image: quay.io/buildah/stable:v1.35.4
      options: --privileged
    needs:
      - get-version-tag
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-containerize-backend"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Containerize
        uses: ./.github/actions/containerize
        with:
          repository: jbrezmorf/zarr-fuse-holoviz-backend
          tag: ${{ needs.get-version-tag.outputs.version-tag }}
          containerfile-path: dashboard/oci/backend.Containerfile
          push: true
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_PASSWORD }}
          working-directory: .

  containerize-frontend:
    name: Containerize HoloViz frontend
    runs-on: ubuntu-latest
    container:
      image: quay.io/buildah/stable:v1.35.4
      options: --privileged
    needs:
      - get-version-tag
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-containerize-frontend"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Containerize
        uses: ./.github/actions/containerize
        with:
          repository: jbrezmorf/zarr-fuse-holoviz-frontend
          tag: ${{ needs.get-version-tag.outputs.version-tag }}
          containerfile-path: dashboard/oci/frontend.Containerfile
          push: true
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_PASSWORD }}
          working-directory: .

  lint-helm-chart:
    name: Lint HoloViz Helm chart
    runs-on: ubuntu-latest
    container:
      image: docker.io/alpine/k8s:1.29.14
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-lint-helm-chart"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint helm chart
        uses: ./.github/actions/helm-lint
        with:
          working-directory: dashboard/charts/holoviz

  deploy:
    name: Deploy HoloViz dashboard to dev namespace
    runs-on: ubuntu-latest
    container:
      image: docker.io/alpine/k8s:1.29.14
    needs:
      - lint-helm-chart
      - get-version-tag
      - containerize-backend
      - containerize-frontend
    env:
      KUBECONFIG: ./kubeconfig.yaml
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-deploy"
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml && chmod 600 kubeconfig.yaml

      - name: Set context
        run: kubectl config set-context --current --namespace=zarr-fuse-dashboard-development

      - name: Deploy app
        run: |
          helm upgrade holoviz-development dashboard/charts/holoviz \
            --install --atomic --timeout 10m --namespace zarr-fuse-dashboard-development \
            --set backend.image.tag="${{ needs.get-version-tag.outputs.version-tag }}" \
            --set frontend.image.tag="${{ needs.get-version-tag.outputs.version-tag }}" \
            --set backend.s3.secrets.accessKey="${{ secrets.S3_ACCESS_KEY }}" \
            --set backend.s3.secrets.secretKey="${{ secrets.S3_SECRET_KEY }}"
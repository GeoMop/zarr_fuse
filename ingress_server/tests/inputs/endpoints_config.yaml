configuration:
  base:
    queue_dir_path: ./workdir/queue
    log_level: INFO
    port: 8000
    worker_poll_interval: 30
  smtp:
    notify_to: [ "stepan.mocik@gmail.com" ]
    host: smtp.gmail.com
    port: 587
    from_email: "zarr.fuse.support@gmail.com"
    username: "zarr.fuse.support@gmail.com"
    password: "" # in .env file, not in plaintext

active_scrappers:
  - name: testing-scrapper
    crons:
      - "15 1 * * *"
      - "45 9 * * *"
      - "15 13 * * *"
      - "45 20 * * *"
    url: "https://api.met.no/weatherapi/locationforecast/2.0/complete"
    schema_path: schemas/testing.yaml
    target_node: "testing"
    extract_fn: normalize_yrno_forecast
    fn_module: inputs.extract.hlavo_extract
    method: GET
    headers:
      - header_name: "User-Agent"
        header_value: "MyWeatherApp/1.0 (your_email@example.com)"
    url_params:
      - param_name: lat
        column_name: dflat
      - param_name: lon
        column_name: dflon
    dataframe_path: dataframes/hlavo_surface_dataframe.csv
    dataframe_has_header: true

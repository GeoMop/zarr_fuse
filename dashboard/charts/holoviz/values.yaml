registry:
  host: docker.io

backend:
  name: holoviz-backend
  replicaCount: 1
  image:
    name: jbrezmorf/zarr-fuse-holoviz-backend
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    externalPort:
      number: 8000
      name: http
    internalPort:
      number: 8000
      name: http

  s3:
    endpointUrl: "https://s3.cl4.du.cesnet.cz"
    secrets:
      accessKey: "your-access-key"
      secretKey: "your-secret-key"

  resources:
    requests:
      cpu: 125m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  securityContext:
    pod:
      fsGroup: 11233
      runAsNonRoot: true
      runAsUser: 11233
      runAsGroup: 11233
    container:
      capabilities:
        drop:
          - ALL
      allowPrivilegeEscalation: false
      privileged: false
      runAsNonRoot: true
      runAsUser: 11233
      runAsGroup: 11233
      seccompProfile:
        type: RuntimeDefault

frontend:
  name: holoviz-frontend
  replicaCount: 1
  endpointName: bukov_endpoint
  image:
    name: jbrezmorf/zarr-fuse-holoviz-frontend
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    externalPort:
      number: 5006
      name: http
    internalPort:
      number: 5006
      name: http

  resources:
    requests:
      cpu: 125m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  securityContext:
    pod:
      fsGroup: 11233
      runAsNonRoot: true
      runAsUser: 11233
      runAsGroup: 11233
    container:
      capabilities:
        drop:
          - ALL
      allowPrivilegeEscalation: false
      privileged: false
      runAsNonRoot: true
      runAsUser: 11233
      runAsGroup: 11233
      seccompProfile:
        type: RuntimeDefault

ingress:
  className: "nginx"
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

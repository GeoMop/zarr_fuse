apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.frontend.name }}
spec:
  replicas: {{ .Values.frontend.replicaCount | int }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.frontend.name }}
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: holoviz
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/version: {{ .Values.frontend.image.tag }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.frontend.securityContext.pod | nindent 8 }}
      volumes:
        - name: app-home
          emptyDir: {}
      containers:
        - name: {{ .Values.frontend.name }}
          image: "{{ .Values.registry.host }}/{{ .Values.frontend.image.name }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: {{ .Values.frontend.service.internalPort.name | quote }}
              containerPort: {{ .Values.frontend.service.internalPort.number | int }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.name }}-secrets
          env:
            - name: HV_API_URL
              value: "http://{{ .Values.backend.name }}:{{ .Values.backend.service.internalPort.number }}"
            - name: HV_DASHBOARD_ENDPOINT
              value: {{ .Values.frontend.endpointName | quote }}
            - name: ZF_CACHE_DIR
              value: {{ .Values.frontend.cacheDir | quote }}
            - name: HOME
              value: /home
            - name: MPLCONFIGDIR
              value: /home/app/.config/matplotlib
          volumeMounts:
            - name: app-home
              mountPath: /home/app
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext.container | nindent 12 }}
          startupProbe:
            tcpSocket:
              port: {{ .Values.frontend.service.internalPort.name | quote }}
            periodSeconds: 5
            failureThreshold: 72
          livenessProbe:
            tcpSocket:
              port: {{ .Values.frontend.service.internalPort.name | quote }}
            periodSeconds: 30
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.frontend.service.internalPort.name | quote }}
            periodSeconds: 30
            failureThreshold: 10
